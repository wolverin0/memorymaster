services:
  postgres:
    image: postgres:16-alpine
    container_name: memorymaster-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: memorymaster
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm_pw
    ports:
      - "6543:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d memorymaster"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - memorymaster_pg_data:/var/lib/postgresql/data

volumes:
  memorymaster_pg_data:
