{{- $imageDigest := required "image.digest is required (use sha256:<digest>)" .Values.image.digest -}}
{{- if not (regexMatch "^sha256:[a-f0-9]{64}$" $imageDigest) -}}
{{- fail "image.digest must be a lowercase sha256:<64-hex-digest> reference" -}}
{{- end -}}
{{- if hasKey .Values.env "QDRANT_API_KEY" -}}
{{- fail "QDRANT_API_KEY is reserved; configure it through .Values.qdrant" -}}
{{- end -}}
{{- if hasKey .Values.env "QDRANT_CA_CERT" -}}
{{- fail "QDRANT_CA_CERT is reserved; configure it through .Values.qdrant" -}}
{{- end -}}
{{- if hasKey .Values.env "QDRANT_URL" -}}
{{- fail "QDRANT_URL is reserved; configure it through .Values.qdrant" -}}
{{- end -}}
{{- if not (hasPrefix "https://" .Values.qdrant.url) -}}
{{- fail "qdrant.url must use HTTPS" -}}
{{- end -}}
{{- $qdrantApiKeySecret := required "qdrant.apiKeySecret.name is required" .Values.qdrant.apiKeySecret.name -}}
{{- if not (has .Values.service.profile (list "dashboard" "mcp-http")) -}}
{{- fail "service.profile must be dashboard or mcp-http; stdio MCP cannot be published as HTTP" -}}
{{- end -}}
{{- if eq .Values.service.profile "dashboard" -}}
{{- $_ := required "service.dashboardTokenSecret.name is required for the dashboard profile" .Values.service.dashboardTokenSecret.name -}}
{{- else -}}
{{- $_ := required "service.mcpHttpTokenSecret.name is required for the mcp-http profile" .Values.service.mcpHttpTokenSecret.name -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-memorymaster
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: memorymaster
  template:
    metadata:
      labels:
        app: memorymaster
    spec:
      containers:
        - name: memorymaster
          image: "{{ .Values.image.repository }}@{{ $imageDigest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- if eq .Values.service.profile "dashboard" }}
            - memorymaster-dashboard
            {{- else }}
            - memorymaster-mcp-http
            {{- end }}
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8765"
            - --db
            - /data/memorymaster.db
            - --workspace
            - /data
          ports:
            - containerPort: 8765
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: QDRANT_URL
              value: {{ .Values.qdrant.url | quote }}
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $qdrantApiKeySecret | quote }}
                  key: {{ .Values.qdrant.apiKeySecret.key | quote }}
            {{- if eq .Values.service.profile "dashboard" }}
            - name: MEMORYMASTER_DASHBOARD_TOKEN_VIEWER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.service.dashboardTokenSecret.name | quote }}
                  key: {{ .Values.service.dashboardTokenSecret.key | quote }}
            {{- else }}
            - name: MEMORYMASTER_MCP_HTTP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.service.mcpHttpTokenSecret.name | quote }}
                  key: {{ .Values.service.mcpHttpTokenSecret.key | quote }}
            - name: MEMORYMASTER_MCP_HTTP_ALLOWED_HOSTS
              value: {{ printf "%s-memorymaster:*,127.0.0.1:*,localhost:*" .Release.Name | quote }}
            {{- end }}
            {{- if .Values.qdrant.caSecret.name }}
            - name: QDRANT_CA_CERT
              value: {{ printf "%s/ca.crt" .Values.qdrant.caSecret.mountPath | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.qdrant.caSecret.name }}
            - name: qdrant-ca
              mountPath: {{ .Values.qdrant.caSecret.mountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.qdrant.caSecret.name }}
        - name: qdrant-ca
          secret:
            secretName: {{ .Values.qdrant.caSecret.name | quote }}
            items:
              - key: {{ .Values.qdrant.caSecret.key | quote }}
                path: ca.crt
        {{- end }}
