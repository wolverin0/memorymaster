{{- if .Values.persistence.enabled }}
{{- $requiredMi := add .Values.retentionCapacity.verbatimMaxMi .Values.retentionCapacity.databaseMaxMi .Values.retentionCapacity.artifactsMaxMi .Values.retentionCapacity.walAndBackupHeadroomMi .Values.retentionCapacity.operatorHeadroomMi }}
{{- if lt (int .Values.persistence.sizeMi) (int $requiredMi) }}
{{- fail (printf "persistence.sizeMi=%v is below the retention envelope of %vMi" .Values.persistence.sizeMi $requiredMi) }}
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.sizeMi }}Mi
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
