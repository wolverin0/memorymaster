name: Publish to PyPI

# Publishes wheel + sdist to PyPI when a version tag is pushed.
#
# Setup (one-time, by repo owner):
#   1. Go to https://pypi.org/manage/project/memorymaster/settings/publishing/
#   2. Add a "Trusted Publisher":
#        - Owner: wolverin0
#        - Repository: memorymaster
#        - Workflow filename: publish.yml
#        - Environment name: pypi
#   3. Push a tag matching v*.*.*  (e.g. `git tag v3.2.0 && git push --tags`)
#
# No API tokens are stored in GitHub secrets — authentication is OIDC.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: tag $TAG_VERSION does not match pyproject.toml $PKG_VERSION"
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/memorymaster
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No username/password — OIDC handles auth via the trusted publisher
