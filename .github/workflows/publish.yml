name: Publish verified distributions to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release candidate once
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Verify tag and package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import re; print(re.search(r'^version\\s*=\\s*\"([^\"]+)\"', open('pyproject.toml').read(), re.M).group(1))")
          test "$TAG_VERSION" = "$PKG_VERSION"
      - name: Build wheel and sdist
        run: python -m build
      - name: Validate distribution metadata
        run: twine check dist/*
      - name: Record immutable distribution hashes
        run: cd dist && sha256sum *.whl *.tar.gz > SHA256SUMS
      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  verify-artifact:
    name: Verify the downloaded release candidate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download release candidate
        uses: actions/download-artifact@v4
        with:
          name: release-candidate-dist
          path: dist/
      - name: Verify immutable hashes
        run: cd dist && sha256sum --check SHA256SUMS
      - name: Install release verification dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev,mcp,security]"
      - name: Block on generated release truth and stable retrieval
        run: |
          python scripts/generate_release_truth.py --check
          pytest tests/test_qrels_regression.py tests/test_release_truth.py tests/test_supply_chain_contracts.py tests/test_setup_profiles.py -q --tb=short
      - name: Run strict retrieval evaluation
        run: python scripts/eval_memorymaster.py --strict
      - name: Clean-wheel import, version, CLI, and MCP smoke
        run: |
          EXPECTED_VERSION=$(python -c "import re; print(re.search(r'^version\\s*=\\s*\"([^\"]+)\"', open('pyproject.toml').read(), re.M).group(1))")
          WHEEL=$(find "$PWD/dist" -maxdepth 1 -name '*.whl' -print -quit)
          python -m venv /tmp/memorymaster-release
          /tmp/memorymaster-release/bin/python -m pip install "$WHEEL"
          cd /tmp
          /tmp/memorymaster-release/bin/python -c "import importlib.metadata, memorymaster; assert memorymaster.__version__ == importlib.metadata.version('memorymaster') == '$EXPECTED_VERSION'"
          /tmp/memorymaster-release/bin/memorymaster --help >/dev/null
          /tmp/memorymaster-release/bin/memorymaster-mcp --help >/dev/null
      - name: Promote the verified files without rebuilding
        run: |
          mkdir verified-dist
          cp dist/*.whl dist/*.tar.gz verified-dist/
      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: verified-dist
          path: verified-dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish the verified artifact to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-artifact
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/memorymaster
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          name: verified-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
