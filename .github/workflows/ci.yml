name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,mcp,security]"
      - name: Run tests
        run: pytest tests/ -q --tb=short
        env:
          MEMORYMASTER_ALLOW_SENSITIVE_BYPASS: "1"

  perf:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run performance smoke (quick profile, best of 3)
        # Shared runners swing 5x between identical runs (observed 32.7 vs
        # 164.7 ops/sec on the same commit). Best-of-3 tolerates runner noise
        # without lowering the SLO bar — a genuine regression fails all three.
        run: |
          for attempt in 1 2 3; do
            python benchmarks/perf_smoke.py --slo-config benchmarks/slo_targets.json --profile quick && exit 0
            echo "perf attempt ${attempt} breached SLO — retrying (shared-runner noise)"
          done
          exit 1
      - name: Upload perf artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-smoke-results
          path: artifacts/perf/perf_smoke.json

  eval:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run evaluation suite
        run: python scripts/eval_memorymaster.py
        continue-on-error: true
      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            artifacts/eval/eval_results.json
            artifacts/eval/eval_report.md
            artifacts/eval/eval_checks.csv
